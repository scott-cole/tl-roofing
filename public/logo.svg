<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="1000" fill="#222222"/>

  <!-- Roof Icon -->
  <g transform="translate(110,180)">
    <!-- Left Blue Roof -->
    <polygon points="0,300 260,50 360,50 120,300" fill="#1E97D4"/>
    <polygon points="180,260 420,20 520,20 280,260" fill="#1E97D4"/>

    <!-- White Roof -->
    <polygon points="320,50 370,0 730,360 630,360" fill="#F2F2F2"/>

    <!-- Center Blue Triangle -->
    <polygon points="400,300 500,200 600,300" fill="#1E97D4"/>

    <!-- Inner dark cutouts -->
    <polygon points="110,260 275,95 315,95 150,260" fill="#222222"/>
    <polygon points="305,240 505,40 545,40 345,240" fill="#222222"/>
    <polygon points="585,260 470,145 510,105 665,260" fill="#222222"/>
  </g>

  <!-- Main Text -->
  <g font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <text x="110" y="640" font-size="115" fill="#1E97D4">TL</text>
    <text x="255" y="640" font-size="115" fill="#FFFFFF">ROOFING</text>
  </g>

  <!-- Bottom Banner -->
  <rect x="110" y="690" width="800" height="60" fill="#1E97D4"/>

  <!-- Bottom Text -->
  <text x="125" y="730"
        font-family="Arial, Helvetica, sans-serif"
        font-size="30"
        letter-spacing="6"
        fill="#111111">
    PROFESSIONAL ROOFING SERVICES
  </text>
</svg>